<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRX WinGo Live Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#cbd5e1;font-family:Arial,sans-serif;overflow:hidden;touch-action:none}
#app{width:100%;height:100vh;display:flex;flex-direction:column}
#toolbar{height:40px;background:#1e293b;display:flex;align-items:center;padding:0 8px;gap:4px;border-bottom:1px solid #334155;flex-shrink:0;overflow-x:auto}
.tb{background:none;border:1px solid #475569;color:#94a3b8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap;user-select:none}
.tb:hover{background:#334155;color:#e2e8f0}
.tb.on{background:#10b981;color:#000;border-color:#10b981}
.tb.dg{border-color:#ef4444;color:#ef4444}
.tb.dg:hover{background:#ef4444;color:#fff}
.tb.da{background:#7f1d1d;border-color:#ef4444;color:#fff}
.sp{width:1px;height:20px;background:#475569;margin:0 4px}
#chart-area{flex:1;position:relative;min-height:0}
#main-chart{width:100%;height:75%}
#rsi-chart{width:100%;height:25%;border-top:1px solid #334155}
#cv{position:absolute;top:0;left:0;width:100%;height:75%;z-index:50;pointer-events:none}
#cv.on{pointer-events:auto;cursor:crosshair}
#ci{position:absolute;top:8px;right:8px;background:rgba(15,23,42,.92);border:1px solid #334155;border-radius:8px;padding:8px 12px;font-size:11px;line-height:1.7;pointer-events:none;z-index:100;display:none;min-width:180px}
.cl{color:#64748b}.cv{color:#e2e8f0}.cb{color:#10b981;font-weight:bold}.cs{color:#ef4444;font-weight:bold}
#cd{position:fixed;top:50px;left:12px;z-index:200;background:rgba(15,23,42,.95);border:1px solid #334155;border-radius:12px;padding:10px 18px;text-align:center;min-width:100px}
#cdt{font-size:28px;font-weight:bold;color:#fbbf24;font-family:monospace}
#cdr{font-size:16px;font-weight:bold;margin-top:4px;min-height:22px}
#cdr.big{color:#10b981}#cdr.small{color:#ef4444}
#ld{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#ld h2{color:#10b981;font-size:22px}#ld p{color:#94a3b8;font-size:13px}
.pw{width:300px;height:8px;background:#1e293b;border-radius:999px;overflow:hidden}
.pb{width:0%;height:100%;background:linear-gradient(90deg,#10b981,#06b6d4);transition:width .3s}
#lt{font-size:12px;color:#64748b}
#bg{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:1000;padding:10px 26px;border-radius:999px;font-size:20px;font-weight:bold;letter-spacing:1px;display:none}
#bg.big{color:#10b981;border:2px solid #10b981;background:rgba(16,185,129,.12)}
#bg.small{color:#ef4444;border:2px solid #ef4444;background:rgba(239,68,68,.12)}
#sh{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(34,211,238,.15);border:1px solid #22d3ee;color:#22d3ee;padding:6px 16px;border-radius:20px;font-size:12px;z-index:200;display:none}
@media(max-width:768px){
.tb{padding:4px 6px;font-size:10px}
#toolbar{height:36px;gap:2px}
#ci{font-size:10px;padding:6px 8px}
#cd{top:44px;left:8px;padding:8px 12px}
#cdt{font-size:22px}
}
</style>
</head>
<body>
<div id="ld"><h2>TRX WinGo Live Chart</h2><p>Loading blockchain history...</p><div class="pw"><div class="pb" id="pb"></div></div><div id="lt">Preparing...</div></div>
<div id="app" style="display:none">
<div id="toolbar">
<button class="tb" id="bCH" onclick="setTool('crosshair')">+</button><div class="sp"></div>
<button class="tb" id="bTL" onclick="setTool('trendline')">Trend</button>
<button class="tb" id="bHL" onclick="setTool('hline')">H-Line</button>
<button class="tb" id="bRC" onclick="setTool('rect')">Rect</button>
<button class="tb" id="bFB" onclick="setTool('fib')">Fib</button>
<button class="tb" id="bTX" onclick="setTool('text')">Text</button><div class="sp"></div>
<button class="tb" id="bE9" onclick="toggleEma(9)">EMA9</button>
<button class="tb" id="bE21" onclick="toggleEma(21)">EMA21</button>
<button class="tb" id="bRSI" onclick="toggleRsi()">RSI</button><div class="sp"></div>
<button class="tb dg" id="bDel" onclick="delSel()">Del</button>
<button class="tb dg" onclick="clrAll()">Clear</button>
</div>
<div id="chart-area">
<div id="main-chart"></div><div id="rsi-chart"></div>
<canvas id="cv"></canvas><div id="ci"></div>
</div>
</div>
<div id="bg"></div><div id="sh">Selected - Del key or Del button</div>
<div id="cd" style="display:none"><div id="cdt">60</div><div id="cdr"></div></div>
<script>
var WU="https://trx-apl.warwar-zc.workers.dev/";
var DN="TRX_CF_V15";var ST="results";var HR=12;var PL=5000;var PG=40;

var pb=document.getElementById("pb"),lt=document.getElementById("lt");
var ldE=document.getElementById("ld"),apE=document.getElementById("app");
var bgE=document.getElementById("bg"),ciE=document.getElementById("ci");
var cvs=document.getElementById("cv"),ctx=cvs.getContext("2d");
var shE=document.getElementById("sh");
var cdE=document.getElementById("cd"),cdtE=document.getElementById("cdt"),cdrE=document.getElementById("cdr");
var mcE=document.getElementById("main-chart"),rcE=document.getElementById("rsi-chart");

var mc=LightweightCharts.createChart(mcE,{
layout:{background:{color:"#0f172a"},textColor:"#94a3b8",fontSize:11},
grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:"rgba(148,163,184,.35)",labelBackgroundColor:"#334155"},horzLine:{color:"rgba(148,163,184,.35)",labelBackgroundColor:"#334155"}},
timeScale:{timeVisible:true,secondsVisible:false,borderColor:"#334155",barSpacing:8,minBarSpacing:3,rightOffset:10},
rightPriceScale:{borderColor:"#334155",scaleMargins:{top:.1,bottom:.1}},
handleScroll:{mouseWheel:true,pressedMouseMove:true},handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true}
});
var cs=mc.addCandlestickSeries({upColor:"#10b981",downColor:"#ef4444",borderUpColor:"#10b981",borderDownColor:"#ef4444",wickUpColor:"#10b981",wickDownColor:"#ef4444"});
var e9s=null,e21s=null,e9=false,e21=false;
var rc=LightweightCharts.createChart(rcE,{
layout:{background:{color:"#0f172a"},textColor:"#94a3b8",fontSize:10},
grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
timeScale:{timeVisible:false,borderColor:"#334155",barSpacing:8,minBarSpacing:3,rightOffset:10},
rightPriceScale:{borderColor:"#334155",scaleMargins:{top:.1,bottom:.1}},
handleScroll:{mouseWheel:true,pressedMouseMove:true},handleScale:{mouseWheel:true,pinch:true}
});
var rsiS=null,rsiSig=null,rsiOn=false,r70=null,r30=null;

mc.timeScale().subscribeVisibleLogicalRangeChange(function(r){if(r)rc.timeScale().setVisibleLogicalRange(r)});
rc.timeScale().subscribeVisibleLogicalRangeChange(function(r){if(r)mc.timeScale().setVisibleLogicalRange(r)});
mc.timeScale().subscribeVisibleLogicalRangeChange(function(){drawAll()});

mc.subscribeCrosshairMove(function(p){
if(tool!=="crosshair"||!p||!p.time){ciE.style.display="none";return}
var a=Array.from(rm.values()).sort(function(a,b){return a.period.localeCompare(b.period)});
var f=null;for(var i=0;i<a.length;i++){if(p2u(a[i].period)===p.time){f=a[i];break}}
if(!f){ciE.style.display="none";return}
ciE.innerHTML='<div><span class="cl">Period: </span><span class="cv">'+f.period+'</span></div><div><span class="cl">Block: </span><span class="cv">'+f.blockHeight+'</span></div><div><span class="cl">Time: </span><span class="cv">'+f.blockTime+'</span></div><div><span class="cl">Result: </span><span class="cv">'+f.result+'</span></div><div><span class="cl">Size: </span><span class="'+(f.bigSmall==="Big"?"cb":"cs")+'">'+f.bigSmall+'</span></div>';
ciE.style.display="block";
});

function rsz(){
var a=document.getElementById("chart-area");var w=a.clientWidth,h=a.clientHeight;
var rh=rsiOn?Math.floor(h*0.25):0;var mh=h-rh;
mcE.style.height=mh+"px";rcE.style.height=rh+"px";rcE.style.display=rsiOn?"block":"none";
mc.applyOptions({width:w,height:mh});if(rsiOn)rc.applyOptions({width:w,height:rh});
cvs.width=w;cvs.height=mh;cvs.style.height=mh+"px";drawAll();
}
window.addEventListener("resize",rsz);

function cEMA(d,p){var e=[];if(d.length<p)return e;var k=2/(p+1),s=0;for(var i=0;i<p;i++)s+=d[i].value;var v=s/p;e.push({time:d[p-1].time,value:Math.round(v*100)/100});for(var j=p;j<d.length;j++){v=d[j].value*k+v*(1-k);e.push({time:d[j].time,value:Math.round(v*100)/100})}return e}
function cSMA(d,p){var s=[];if(d.length<p)return s;for(var i=p-1;i<d.length;i++){var v=0;for(var j=i-p+1;j<=i;j++)v+=d[j].value;s.push({time:d[i].time,value:Math.round((v/p)*100)/100})}return s}
function cRSI(d,p){var r=[];if(d.length<p+1)return r;var g=0,l=0;for(var i=1;i<=p;i++){var x=d[i].value-d[i-1].value;if(x>0)g+=x;else l-=x}var ag=g/p,al=l/p;var rs=al===0?100:ag/al;r.push({time:d[p].time,value:Math.round((100-100/(1+rs))*100)/100});for(var j=p+1;j<d.length;j++){var x=d[j].value-d[j-1].value;var gg=x>0?x:0,ll=x<0?-x:0;ag=(ag*(p-1)+gg)/p;al=(al*(p-1)+ll)/p;rs=al===0?100:ag/al;r.push({time:d[j].time,value:Math.round((100-100/(1+rs))*100)/100})}return r}

function toggleEma(p){if(p===9){e9=!e9;document.getElementById("bE9").classList.toggle("on",e9);if(!e9&&e9s){mc.removeSeries(e9s);e9s=null}}else{e21=!e21;document.getElementById("bE21").classList.toggle("on",e21);if(!e21&&e21s){mc.removeSeries(e21s);e21s=null}}uInd()}
function toggleRsi(){rsiOn=!rsiOn;document.getElementById("bRSI").classList.toggle("on",rsiOn);if(!rsiOn){if(rsiS){rc.removeSeries(rsiS);rsiS=null}if(rsiSig){rc.removeSeries(rsiSig);rsiSig=null}if(r70){rc.removeSeries(r70);r70=null}if(r30){rc.removeSeries(r30);r30=null}}rsz();uInd()}

function gPD(){var a=Array.from(rm.values()).sort(function(a,b){return a.period.localeCompare(b.period)});var c=Date.now()-HR*3600000;var v=a.filter(function(r){return r.timestamp>=c});var pd=[];var pr=100;var pv=null;for(var i=0;i<v.length;i++){var row=v[i];var s=row.bigSmall==="Big"?"big":"small";if(s==="big"){if(pv==="big")pr+=1}else{if(pv==="small")pr-=1}pd.push({time:p2u(row.period),value:s==="big"?pr+1:pr});pv=s}return pd}

function uInd(){var pd=gPD();if(e9){var d=cEMA(pd,9);if(!e9s)e9s=mc.addLineSeries({color:"#f59e0b",lineWidth:1,lastValueVisible:false,priceLineVisible:false});e9s.setData(d)}if(e21){var d=cEMA(pd,21);if(!e21s)e21s=mc.addLineSeries({color:"#8b5cf6",lineWidth:1,lastValueVisible:false,priceLineVisible:false});e21s.setData(d)}if(rsiOn){var rd=cRSI(pd,14);var rs=cSMA(rd,9);if(!rsiS){rsiS=rc.addLineSeries({color:"#06b6d4",lineWidth:1.5,lastValueVisible:true,priceLineVisible:false});rsiSig=rc.addLineSeries({color:"#f59e0b",lineWidth:1,lastValueVisible:true,priceLineVisible:false});r70=rc.addLineSeries({color:"rgba(239,68,68,.3)",lineWidth:1,lineStyle:2,lastValueVisible:false,priceLineVisible:false});r30=rc.addLineSeries({color:"rgba(16,185,129,.3)",lineWidth:1,lineStyle:2,lastValueVisible:false,priceLineVisible:false})}rsiS.setData(rd);rsiSig.setData(rs);if(rd.length>0){r70.setData([{time:rd[0].time,value:70},{time:rd[rd.length-1].time,value:70}]);r30.setData([{time:rd[0].time,value:30},{time:rd[rd.length-1].time,value:30}])}}}var tool="crosshair";
var drs=[];
var ds=null;
var drag=null;
var epd=null;
var selM=false;
var lpt=null;

function gp(e){var r=cvs.getBoundingClientRect();if(e.touches&&e.touches.length)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top}}

function setTool(t){
tool=t;selM=false;
for(var i=0;i<drs.length;i++)drs[i].sel=false;
shE.style.display="none";document.getElementById("bDel").classList.remove("da");
document.querySelectorAll("#toolbar .tb").forEach(function(b){
var id=b.id;if(id&&id!=="bDel"&&id!=="bE9"&&id!=="bE21"&&id!=="bRSI")b.classList.remove("on");
});
if(t==="crosshair")document.getElementById("bCH").classList.add("on");
else if(t==="trendline")document.getElementById("bTL").classList.add("on");
else if(t==="hline")document.getElementById("bHL").classList.add("on");
else if(t==="rect")document.getElementById("bRC").classList.add("on");
else if(t==="fib")document.getElementById("bFB").classList.add("on");
else if(t==="text")document.getElementById("bTX").classList.add("on");
if(t==="crosshair"){
cvs.classList.remove("on");cvs.style.cursor="";
mc.applyOptions({handleScroll:{mouseWheel:true,pressedMouseMove:true},handleScale:{mouseWheel:true,pinch:true}});
ciE.style.display="block";
}else{
cvs.classList.add("on");cvs.style.cursor="crosshair";
mc.applyOptions({handleScroll:{mouseWheel:true,pressedMouseMove:false},handleScale:{mouseWheel:true,pinch:true}});
ciE.style.display="none";
}
ds=null;drag=null;epd=null;drawAll();
}

function enterSel(mx,my){
selM=true;cvs.classList.add("on");cvs.style.cursor="pointer";
mc.applyOptions({handleScroll:{mouseWheel:true,pressedMouseMove:false}});
doSel(mx,my);
}

function exitSel(){
selM=false;
for(var i=0;i<drs.length;i++)drs[i].sel=false;
shE.style.display="none";document.getElementById("bDel").classList.remove("da");
if(tool==="crosshair"){cvs.classList.remove("on");cvs.style.cursor="";mc.applyOptions({handleScroll:{mouseWheel:true,pressedMouseMove:true}})}
drawAll();
}

function doSel(mx,my){
var found=false;
for(var i=drs.length-1;i>=0;i--){
drs[i].sel=false;
if(!found&&ht(drs[i],mx,my)){drs[i].sel=true;found=true}
}
drawAll();
shE.style.display=found?"block":"none";
document.getElementById("bDel").classList.toggle("da",found);
return found;
}

function ht(d,mx,my){
var T=14;
var x1=t2x(d.t1),y1=p2y(d.p1);
if(x1<-9000||y1<-9000)return false;
if(d.tp==="text")return Math.abs(mx-x1)<50&&Math.abs(my-y1)<20;
if(d.tp==="hline")return Math.abs(my-y1)<T;
var x2=t2x(d.t2),y2=p2y(d.p2);
if(x2<-9000||y2<-9000)return false;
if(d.tp==="trendline"){
var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
if(len<2)return false;
var dist=Math.abs(dy*mx-dx*my+x2*y1-y2*x1)/len;
return dist<T&&mx>=Math.min(x1,x2)-T&&mx<=Math.max(x1,x2)+T;
}
if(d.tp==="rect"){
var ax=Math.min(x1,x2),bx=Math.max(x1,x2),ay=Math.min(y1,y2),by=Math.max(y1,y2);
if(mx>=ax-T&&mx<=bx+T&&(Math.abs(my-ay)<T||Math.abs(my-by)<T))return true;
if(my>=ay-T&&my<=by+T&&(Math.abs(mx-ax)<T||Math.abs(mx-bx)<T))return true;
return false;
}
if(d.tp==="fib")return my>=Math.min(y1,y2)-T&&my<=Math.max(y1,y2)+T;
return false;
}

function fEP(d,mx,my){
var T=25;
if(d.tp==="hline"||d.tp==="text")return null;
var x1=t2x(d.t1),y1=p2y(d.p1);
var x2=t2x(d.t2),y2=p2y(d.p2);
if(x1>-9000&&y1>-9000&&Math.abs(mx-x1)<T&&Math.abs(my-y1)<T)return 1;
if(x2>-9000&&y2>-9000&&Math.abs(mx-x2)<T&&Math.abs(my-y2)<T)return 2;
return null;
}

function t2x(t){try{var v=mc.timeScale().timeToCoordinate(t);return(v===null||v===undefined)?-9999:v}catch(e){return -9999}}
function p2y(p){try{var v=cs.priceToCoordinate(p);return(v===null||v===undefined)?-9999:v}catch(e){return -9999}}
function x2t(x){try{return mc.timeScale().coordinateToTime(x)}catch(e){return null}}
function y2p(y){try{return cs.coordinateToPrice(y)}catch(e){return null}}

cvs.addEventListener("mousedown",function(e){onS(e)});
cvs.addEventListener("mousemove",function(e){onM(e)});
cvs.addEventListener("mouseup",function(e){onE(e)});
cvs.addEventListener("touchstart",function(e){e.preventDefault();clearTimeout(lpt);var pos=gp(e);lpt=setTimeout(function(){if(tool==="crosshair"){for(var i=0;i<drs.length;i++){if(ht(drs[i],pos.x,pos.y)){enterSel(pos.x,pos.y);return}}}},500);onS(e)},{passive:false});
cvs.addEventListener("touchmove",function(e){e.preventDefault();clearTimeout(lpt);onM(e)},{passive:false});
cvs.addEventListener("touchend",function(e){e.preventDefault();clearTimeout(lpt);onE(e)},{passive:false});

mcE.addEventListener("dblclick",function(e){
if(tool!=="crosshair")return;
var rect=cvs.getBoundingClientRect();
var mx=e.clientX-rect.left,my=e.clientY-rect.top;
for(var i=0;i<drs.length;i++){if(ht(drs[i],mx,my)){enterSel(mx,my);return}}
});

function onS(e){
var pos=gp(e);

if(selM){
var sel=null;
for(var i=0;i<drs.length;i++){if(drs[i].sel){sel=drs[i];break}}
if(sel){
var ep=fEP(sel,pos.x,pos.y);
if(ep){epd={d:sel,ep:ep};return}
if(ht(sel,pos.x,pos.y)){
drag={d:sel,sx:pos.x,sy:pos.y,ot1:sel.t1,op1:sel.p1,ot2:sel.t2,op2:sel.p2};
return;
}
}
if(!doSel(pos.x,pos.y))exitSel();
return;
}

if(tool==="crosshair")return;

if(tool==="text"){
var label=prompt("Enter text:");
if(label){
var t=x2t(pos.x),p=y2p(pos.y);
if(t!==null&&p!==null){drs.push({tp:"text",t1:t,p1:p,t2:t,p2:p,tx:label,sel:false});drawAll()}
}
return;
}

ds={tp:tool,sx:pos.x,sy:pos.y,cx:pos.x,cy:pos.y};
}

function onM(e){
clearTimeout(lpt);
var pos=gp(e);

if(epd){
var d=epd.d;
var t=x2t(pos.x),p=y2p(pos.y);
if(epd.ep===1){if(t!==null)d.t1=t;if(p!==null)d.p1=p}
else{if(t!==null)d.t2=t;if(p!==null)d.p2=p}
drawAll();return;
}

if(drag){
var d=drag.d;
var dx=pos.x-drag.sx,dy=pos.y-drag.sy;
var nx1=t2x(drag.ot1)+dx,ny1=p2y(drag.op1)+dy;
var nt1=x2t(nx1),np1=y2p(ny1);
if(nt1!==null)d.t1=nt1;if(np1!==null)d.p1=np1;
if(d.tp!=="hline"&&d.tp!=="text"){
var nx2=t2x(drag.ot2)+dx,ny2=p2y(drag.op2)+dy;
var nt2=x2t(nx2),np2=y2p(ny2);
if(nt2!==null)d.t2=nt2;if(np2!==null)d.p2=np2;
}
drawAll();return;
}

if(!ds)return;
ds.cx=pos.x;ds.cy=pos.y;
drawAll();

ctx.save();ctx.strokeStyle="#fbbf24";ctx.lineWidth=1;ctx.setLineDash([4,4]);
if(ds.tp==="trendline"){ctx.beginPath();ctx.moveTo(ds.sx,ds.sy);ctx.lineTo(ds.cx,ds.cy);ctx.stroke()}
else if(ds.tp==="hline"){ctx.beginPath();ctx.moveTo(0,ds.sy);ctx.lineTo(cvs.width,ds.sy);ctx.stroke()}
else if(ds.tp==="rect"){ctx.strokeRect(ds.sx,ds.sy,ds.cx-ds.sx,ds.cy-ds.sy)}
else if(ds.tp==="fib"){ctx.beginPath();ctx.moveTo(ds.sx,ds.sy);ctx.lineTo(ds.cx,ds.cy);ctx.stroke()}
ctx.restore();
}

function onE(e){
clearTimeout(lpt);
if(epd){epd=null;drawAll();return}
if(drag){drag=null;drawAll();return}
if(!ds)return;

var t1=x2t(ds.sx),p1=y2p(ds.sy);
var t2=x2t(ds.cx),p2=y2p(ds.cy);
if(t1===null||p1===null){ds=null;return}
if(ds.tp!=="hline"&&(t2===null||p2===null)){ds=null;return}
if(ds.tp==="hline"){t2=t1;p2=p1}

drs.push({tp:ds.tp,t1:t1,p1:p1,t2:t2,p2:p2,sel:false});
ds=null;drawAll();
}

function drawAll(){
ctx.clearRect(0,0,cvs.width,cvs.height);
for(var i=0;i<drs.length;i++){
var d=drs[i];
var x1=t2x(d.t1),y1=p2y(d.p1);
if(x1<-9000||y1<-9000)continue;
var c=d.sel?"#22d3ee":"#fbbf24";
ctx.save();ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=d.sel?2:1;ctx.setLineDash([]);

if(d.tp==="text"){
ctx.font="12px Arial";ctx.fillText(d.tx,x1,y1);
if(d.sel){ctx.strokeStyle="#22d3ee";ctx.lineWidth=1;ctx.strokeRect(x1-2,y1-14,ctx.measureText(d.tx).width+4,18)}
ctx.restore();continue;
}
if(d.tp==="hline"){
ctx.beginPath();ctx.moveTo(0,y1);ctx.lineTo(cvs.width,y1);ctx.stroke();
ctx.font="10px Arial";ctx.fillText(d.p1.toFixed(1),cvs.width-50,y1-4);
if(d.sel){ctx.fillStyle="#22d3ee";ctx.beginPath();ctx.arc(cvs.width/2,y1,5,0,Math.PI*2);ctx.fill()}
ctx.restore();continue;
}
var x2=t2x(d.t2),y2=p2y(d.p2);
if(x2<-9000||y2<-9000){ctx.restore();continue}
if(d.tp==="trendline"){
ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
if(d.sel){ctx.fillStyle="#22d3ee";ctx.beginPath();ctx.arc(x1,y1,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x2,y2,6,0,Math.PI*2);ctx.fill()}
}else if(d.tp==="rect"){
ctx.strokeRect(x1,y1,x2-x1,y2-y1);
ctx.fillStyle=d.sel?"rgba(34,211,238,.06)":"rgba(251,191,36,.06)";
ctx.fillRect(x1,y1,x2-x1,y2-y1);
if(d.sel){ctx.fillStyle="#22d3ee";[{a:x1,b:y1},{a:x2,b:y1},{a:x1,b:y2},{a:x2,b:y2}].forEach(function(pt){ctx.beginPath();ctx.arc(pt.a,pt.b,5,0,Math.PI*2);ctx.fill()})}
}else if(d.tp==="fib"){
var levels=[0,0.236,0.382,0.5,0.618,0.786,1];
var colors=["#ef4444","#f59e0b","#eab308","#22c55e","#06b6d4","#8b5cf6","#ef4444"];
var dy=y2-y1;
for(var j=0;j<levels.length;j++){
var fy=y1+dy*levels[j];
ctx.strokeStyle=d.sel?"#22d3ee":colors[j];ctx.lineWidth=1;ctx.setLineDash([2,2]);
ctx.beginPath();ctx.moveTo(0,fy);ctx.lineTo(cvs.width,fy);ctx.stroke();
ctx.fillStyle=d.sel?"#22d3ee":colors[j];ctx.font="10px Arial";ctx.fillText((levels[j]*100).toFixed(1)+"%",4,fy-3);
}
}
ctx.restore();
}
}

function delSel(){var b=drs.length;drs=drs.filter(function(d){return!d.sel});if(drs.length<b){shE.style.display="none";document.getElementById("bDel").classList.remove("da")}drawAll()}
function clrAll(){if(!drs.length)return;if(confirm("Clear all drawings?")){drs=[];shE.style.display="none";document.getElementById("bDel").classList.remove("da");drawAll()}}

document.addEventListener("keydown",function(e){
if(e.key==="Delete"||e.key==="Backspace"){if(drs.some(function(d){return d.sel})){delSel();e.preventDefault()}}
if(e.key==="Escape")exitSel();
});

function oDB(){return new Promise(function(ok,no){var r=indexedDB.open(DN,1);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:"period"})};r.onsuccess=function(e){ok(e.target.result)};r.onerror=function(e){no(e.target.error)}})}
function dPM(db,recs){return new Promise(function(ok,no){var tx=db.transaction(ST,"readwrite");var st=tx.objectStore(ST);recs.forEach(function(r){st.put(r)});tx.oncomplete=ok;tx.onerror=function(e){no(e.target.error)}})}
function dGA(db){return new Promise(function(ok,no){var tx=db.transaction(ST,"readonly");var r=tx.objectStore(ST).getAll();r.onsuccess=function(){ok(r.result||[])};r.onerror=function(e){no(e.target.error)}})}

function wt(ms){return new Promise(function(r){setTimeout(r,ms)})}
function sP(p,t){pb.style.width=p+"%";lt.textContent=t}
function sUI(){ldE.style.display="none";apE.style.display="flex";rsz();setTool("crosshair");cdE.style.display="block";sCD()}
function p2u(p){return Math.floor(Date.UTC(+p.slice(0,4),+p.slice(4,6)-1,+p.slice(6,8),+p.slice(8,10),+p.slice(10,12),0)/1000)}
function sBg(rec){bgE.textContent=rec.bigSmall.toUpperCase()+"  "+rec.result;bgE.className=rec.bigSmall==="Big"?"big":"small";bgE.style.display="block";setTimeout(function(){bgE.style.display="none"},4000)}

function fHP(start){return fetch(WU+"?mode=page&start="+(start||0)+"&limit="+PG+"&_="+Date.now()+"_"+Math.random()).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()})}
function fLR(){return fetch(WU+"?mode=latest&_="+Date.now()+"_"+Math.random()).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()})}

var db;var rm=new Map();var fv=false;var llp=null;
function uR(rec){var old=rm.get(rec.period);if(!old||rec.timestamp>old.timestamp){rm.set(rec.period,rec);return true}return false}

function render(){
var all=Array.from(rm.values()).sort(function(a,b){return a.period.localeCompare(b.period)});
var cut=Date.now()-HR*3600000;var vis=all.filter(function(r){return r.timestamp>=cut});
var candles=[];var pr=100;var pv=null;
for(var i=0;i<vis.length;i++){var row=vis[i];var s=row.bigSmall==="Big"?"big":"small";var t=p2u(row.period);
if(s==="big"){if(pv==="big")pr+=1;candles.push({time:t,open:pr,high:pr+1,low:pr,close:pr+1})}
else{if(pv==="small")pr-=1;candles.push({time:t,open:pr+1,high:pr+1,low:pr,close:pr})}
pv=s}
cs.setData(candles);uInd();drawAll();
}

async function lH(){
var cached=await dGA(db);
if(cached.length>0){cached.forEach(function(r){rm.set(r.period,r)});render();sUI();fv=true;mc.timeScale().fitContent()}
sAP();
sP(5,"Scanning blockchain...");
var now=Date.now();var target=now-HR*3600000;var start=0;var done=false;
while(!done){var payload;try{payload=await fHP(start)}catch(e){console.error(e);await wt(2000);continue}
var records=Array.isArray(payload.records)?payload.records:[];var oldestTs=payload.oldestTs||now;
if(records.length){for(var i=0;i<records.length;i++)uR(records[i]);await dPM(db,records)}
var covered=((now-oldestTs)/3600000).toFixed(1);var pct=Math.min(95,Math.floor(((now-oldestTs)/(now-target))*100));
sP(pct,"Scanning... "+covered+"h covered");
if(!fv&&rm.size>=20){render();sUI();fv=true;mc.timeScale().fitContent()}
else if(fv)render();
if(oldestTs<=target||payload.rowCount===0)done=true;else start+=PG;await wt(150)}
render();if(!fv){sUI();mc.timeScale().fitContent();fv=true}
}

async function lP(){
try{var payload=await fLR();var rec=payload.record;if(!rec)return;
var changed=uR(rec);
if(changed){await dPM(db,[rec]);render();
if(rec.period!==llp){llp=rec.period;sBg(rec);sRC(rec)}
}}catch(e){console.error(e)}
}

function sAP(){clearInterval(window.__tp);window.__tp=setInterval(function(){lP().catch(function(e){console.error(e)})},PL);lP()}
document.addEventListener("visibilitychange",function(){if(!document.hidden)lP().catch(function(){})});
window.addEventListener("focus",function(){lP().catch(function(){})});

var cdI=null;
function sCD(){
clearInterval(cdI);
cdI=setInterval(function(){
var sec=new Date().getUTCSeconds();
var rem=54-sec;if(rem<0)rem=60+rem;
if(rem<=0){cdtE.textContent="...";cdtE.style.color="#10b981"}
else if(rem<=5){cdtE.textContent=rem+"s";cdtE.style.color="#ef4444"}
else if(rem<=15){cdtE.textContent=rem+"s";cdtE.style.color="#f59e0b"}
else{cdtE.textContent=rem+"s";cdtE.style.color="#fbbf24"}
},1000);
}

function sRC(rec){
cdrE.textContent=rec.bigSmall.toUpperCase()+" "+rec.result;
cdrE.className=rec.bigSmall==="Big"?"big":"small";
}

(async function(){
try{db=await oDB();sP(3,"Database ready...");await wt(200);
await lH();sP(100,"Done!");await wt(400);sUI();
}catch(e){console.error(e);lt.textContent="Error: "+e.message}
})();
</script>
