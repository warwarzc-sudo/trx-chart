<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRX WinGo Live Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f172a;color:#cbd5e1;font-family:Arial,sans-serif;overflow:hidden}
#chart{width:100%;height:100vh}
#loading{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading h2{margin:0;color:#10b981;font-size:22px}
.pw{width:300px;height:8px;background:#1e293b;border-radius:999px;overflow:hidden}
.pb{width:0%;height:100%;background:linear-gradient(90deg,#10b981,#06b6d4);transition:width .3s}
#loadTxt{font-size:12px;color:#64748b;text-align:center}
#box{position:fixed;top:12px;left:12px;z-index:1000;background:rgba(15,23,42,.96);border:1px solid #334155;border-radius:12px;padding:10px 14px;min-width:260px;font-size:12px;line-height:1.9;display:none}
.lv{color:#10b981;font-weight:bold}
.lb{color:#64748b}
.vl{color:#e2e8f0}
.bg{color:#10b981;font-weight:bold}
.sm{color:#ef4444;font-weight:bold}
#hbox{position:fixed;top:12px;right:12px;z-index:1000;background:rgba(15,23,42,.96);border:1px solid #334155;border-radius:12px;padding:10px 14px;font-size:12px;line-height:1.9;color:#94a3b8;display:none}
#badge{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:1000;padding:10px 26px;border-radius:999px;font-size:20px;font-weight:bold;letter-spacing:1px;display:none}
#badge.big{color:#10b981;border:2px solid #10b981;background:rgba(16,185,129,.12)}
#badge.small{color:#ef4444;border:2px solid #ef4444;background:rgba(239,68,68,.12)}
</style>
</head>
<body>
<div id="loading">
    <h2>TRX WinGo Live Chart</h2>
    <p style="color:#94a3b8;margin:0;font-size:13px">Loading blockchain history...</p>
    <div class="pw"><div class="pb" id="pbar"></div></div>
    <div id="loadTxt">Preparing...</div>
</div>
<div id="box">
    <div><span class="lv">● LIVE</span></div>
    <div><span class="lb">Periods: </span><span class="vl" id="xTotal">--</span></div>
    <div><span class="lb">Latest: </span><span class="vl" id="xPeriod">--</span></div>
    <div><span class="lb">Block: </span><span class="vl" id="xBlock">--</span></div>
    <div><span class="lb">Result: </span><span class="vl" id="xResult">--</span></div>
    <div><span class="lb">Big: </span><span class="bg" id="xBig">--</span><span class="lb"> Small: </span><span class="sm" id="xSmall">--</span></div>
    <div><span class="lb">Updated: </span><span class="vl" id="xTime">--</span></div>
</div>
<div id="hbox">
    <div>Scroll = Zoom</div>
    <div>Drag = Move</div>
    <div>Green = Big (5-9)</div>
    <div>Red = Small (0-4)</div>
    <div>Auto update = 10 sec</div>
</div>
<div id="badge"></div>
<div id="chart"></div>
<script>
var WORKER_URL=""https://trx-apl.warwar-zc.workers.dev/";
var DB_NAME="TRX_CF_V1";
var STORE="results";
var HOURS=12;
var POLL=10000;
var PAGE=40;

var pbar=document.getElementById("pbar");
var loadTxt=document.getElementById("loadTxt");
var loadingEl=document.getElementById("loading");
var boxEl=document.getElementById("box");
var hboxEl=document.getElementById("hbox");
var badgeEl=document.getElementById("badge");

var chart=LightweightCharts.createChart(document.getElementById("chart"),{
    width:innerWidth,height:innerHeight,
    layout:{background:{color:"#0f172a"},textColor:"#94a3b8",fontSize:11},
    grid:{vertLines:{color:"#1e293b"},horzLines:{color:"#1e293b"}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,
        vertLine:{color:"rgba(148,163,184,.35)",labelBackgroundColor:"#334155"},
        horzLine:{color:"rgba(148,163,184,.35)",labelBackgroundColor:"#334155"}},
    timeScale:{timeVisible:true,secondsVisible:false,borderColor:"#334155",barSpacing:8,minBarSpacing:3,rightOffset:10},
    rightPriceScale:{borderColor:"#334155",scaleMargins:{top:.18,bottom:.18}},
    handleScroll:{mouseWheel:true,pressedMouseMove:true},
    handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true}
});

var series=chart.addCandlestickSeries({
    upColor:"#10b981",downColor:"#ef4444",
    borderUpColor:"#10b981",borderDownColor:"#ef4444",
    wickUpColor:"#10b981",wickDownColor:"#ef4444",
    autoscaleInfoProvider:function(o){
        var r=o();if(!r)return null;
        var mn=r.priceRange.minValue,mx=r.priceRange.maxValue;
        var pad=Math.max(6,(mx-mn)*1.2);
        return{priceRange:{minValue:mn-pad,maxValue:mx+pad}};
    }
});

addEventListener("resize",function(){chart.applyOptions({width:innerWidth,height:innerHeight})});

function openDB(){
    return new Promise(function(ok,no){
        var r=indexedDB.open(DB_NAME,1);
        r.onupgradeneeded=function(e){
            var d=e.target.result;
            if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:"period"});
        };
        r.onsuccess=function(e){ok(e.target.result)};
        r.onerror=function(e){no(e.target.error)};
    });
}

function dbPutMany(db,recs){
    return new Promise(function(ok,no){
        var tx=db.transaction(STORE,"readwrite");
        var st=tx.objectStore(STORE);
        recs.forEach(function(r){st.put(r)});
        tx.oncomplete=ok;
        tx.onerror=function(e){no(e.target.error)};
    });
}

function dbGetAll(db){
    return new Promise(function(ok,no){
        var tx=db.transaction(STORE,"readonly");
        var r=tx.objectStore(STORE).getAll();
        r.onsuccess=function(){ok(r.result||[])};
        r.onerror=function(e){no(e.target.error)};
    });
}

function wait(ms){return new Promise(function(r){setTimeout(r,ms)})}

function setP(p,t){pbar.style.width=p+"%";loadTxt.textContent=t}

function showUI(){
    loadingEl.style.display="none";
    boxEl.style.display="block";
    hboxEl.style.display="block";
}

function toPeriod(ts){
    var d=new Date(ts);
    return String(d.getUTCFullYear())+
        String(d.getUTCMonth()+1).padStart(2,"0")+
        String(d.getUTCDate()).padStart(2,"0")+
        String(d.getUTCHours()).padStart(2,"0")+
        String(d.getUTCMinutes()).padStart(2,"0");
}

function pToUnix(p){
    return Math.floor(Date.UTC(+p.slice(0,4),+p.slice(4,6)-1,+p.slice(6,8),+p.slice(8,10),+p.slice(10,12),0)/1000);
}

function utcTime(ts){
    var d=new Date(ts);
    return String(d.getUTCHours()).padStart(2,"0")+":"+
        String(d.getUTCMinutes()).padStart(2,"0")+":"+
        String(d.getUTCSeconds()).padStart(2,"0");
}

function rHash(h){
    var p=h.length>16?h.slice(16):h;
    for(var i=p.length-1;i>=0;i--)if(p[i]>="0"&&p[i]<="9")return+p[i];
    for(var j=h.length-1;j>=0;j--)if(h[j]>="0"&&h[j]<="9")return+h[j];
    return 0;
}

function toRec(row){
    var r=rHash(row.hash);
    return{
        period:toPeriod(row.timestamp),
        blockHeight:row.number,
        blockTime:utcTime(row.timestamp),
        hash:row.hash,
        timestamp:row.timestamp,
        second:new Date(row.timestamp).getUTCSeconds(),
        result:r,
        bigSmall:r>=5?"Big":"Small"
    };
}

function updSt(t){
    var arr=Array.from(rMap.values()).sort(function(a,b){return a.period.localeCompare(b.period)});
    var last=arr[arr.length-1];
    var bc=arr.filter(function(x){return x.bigSmall==="Big"}).length;
    document.getElementById("xTotal").textContent=arr.length+" periods";
    document.getElementById("xBig").textContent=bc;
    document.getElementById("xSmall").textContent=arr.length-bc;
    document.getElementById("xTime").textContent=new Date().toLocaleTimeString();
    if(last){
        document.getElementById("xPeriod").textContent=last.period;
        document.getElementById("xBlock").textContent=last.blockHeight;
        document.getElementById("xResult").textContent=last.result+" ("+last.bigSmall+")";
    }
}

function showBadge(rec){
    badgeEl.textContent=rec.bigSmall.toUpperCase()+"  "+rec.result;
    badgeEl.className=rec.bigSmall==="Big"?"big":"small";
    badgeEl.style.display="block";
    setTimeout(function(){badgeEl.style.display="none"},4000);
}

function fetchBlocks(start){
    var url=WORKER_URL+"?start="+(start||0)+"&limit="+PAGE+"&_="+Date.now();
    return fetch(url)
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()})
        .then(function(d){return Array.isArray(d.data)?d.data:[]});
}

var db;
var rMap=new Map();
var firstVisible=false;
var lastLP=null;

function procRows(rows){
    var sv=[];
    for(var i=0;i<rows.length;i++){
        var rec=toRec(rows[i]);
        if(rec.second!==54)continue;
        var old=rMap.get(rec.period);
        if(!old||rec.timestamp>old.timestamp){rMap.set(rec.period,rec);sv.push(rec)}
    }
    if(sv.length)return dbPutMany(db,sv).then(function(){return true});
    return Promise.resolve(false);
}

function render(){
    var all=Array.from(rMap.values()).sort(function(a,b){return a.period.localeCompare(b.period)});
    var cut=Date.now()-HOURS*3600000;
    var vis=all.filter(function(r){return r.timestamp>=cut});
    var c=[],price=100,prev=null;
    for(var i=0;i<vis.length;i++){
        var row=vis[i];
        var s=row.bigSmall==="Big"?"big":"small";
        var t=pToUnix(row.period);
        if(s==="big"){if(prev==="big")price+=1;c.push({time:t,open:price,high:price+1,low:price,close:price+1})}
        else{if(prev==="small")price-=1;c.push({time:t,open:price+1,high:price+1,low:price,close:price})}
        prev=s;
    }
    series.setData(c);
}

async function loadHistory(){
    var cached=await dbGetAll(db);
    if(cached.length>0){
        cached.forEach(function(r){rMap.set(r.period,r)});
        render();updSt("Loaded from cache");showUI();firstVisible=true;
        chart.timeScale().fitContent();
    }
    setP(5,"Scanning blockchain...");
    var now=Date.now();
    var target=now-HOURS*3600000;
    var pg=0,sc=0,ot=now,done=false;
    while(!done){
        var rows;
        try{rows=await fetchBlocks(pg*PAGE)}catch(e){console.error(e);await wait(2000);continue}
        if(!rows.length)break;
        sc+=rows.length;ot=rows[rows.length-1].timestamp;
        var ch=await procRows(rows);
        var cv=((now-ot)/3600000).toFixed(1);
        var pct=Math.min(95,Math.floor(((now-ot)/(now-target))*100));
        setP(pct,"Scanning... page "+(pg+1)+", "+cv+"h covered");
        if(!firstVisible&&rMap.size>=20){render();updSt("Syncing...");showUI();firstVisible=true;chart.timeScale().fitContent()}
        else if(firstVisible&&(ch||pg%3===0)){render();updSt("Syncing...")}
        if(ot<=target)done=true;
        pg++;await wait(150);
    }
    render();updSt("Ready");
    if(!firstVisible){showUI();chart.timeScale().fitContent();firstVisible=true}
}

async function livePoll(){
    try{
        var rows=await fetchBlocks(0);
        var exact=[];
        for(var i=0;i<rows.length;i++){var rec=toRec(rows[i]);if(rec.second===54)exact.push(rec)}
        if(!exact.length){updSt("Waiting :54 block...");return}
        exact.sort(function(a,b){return a.timestamp-b.timestamp});
        var nw=exact[exact.length-1];
        var old=rMap.get(nw.period);
        if(!old||nw.timestamp>old.timestamp){
            rMap.set(nw.period,nw);
            await dbPutMany(db,[nw]);
            render();chart.timeScale().scrollToRealTime();updSt("Live synced");
            if(nw.period!==lastLP){lastLP=nw.period;showBadge(nw)}
        }else{updSt("Live synced")}
    }catch(e){console.error(e);updSt("Live error")}
}

function liveLoop(){livePoll().then(function(){setTimeout(liveLoop,POLL)}).catch(function(){setTimeout(liveLoop,POLL)})}

(async function(){
    try{
        db=await openDB();
        setP(3,"Database ready...");
        await wait(200);
        await loadHistory();
        setP(100,"Done!");
        await wait(500);
        showUI();
        liveLoop();
    }catch(e){
        console.error(e);
        loadTxt.textContent="Error: "+e.message;
    }
})();
</script>
</body>
</html>
